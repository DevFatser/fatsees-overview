# Netlify config for the Fatsees Build Overview.
# Static site, no build step. Netlify serves index.html at root.

[build]
  publish = "."

# Keep the served HTML fresh so anyone reloading the page sees the latest
# code + latest cached Supabase data. Supabase itself handles the "live"
# state via realtime subscriptions.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Legacy path: some Discord links might still point at the old filename.
[[redirects]]
  from = "/Developer_Portal_Overview.html"
  to = "/index.html"
  status = 200

# Board-state JSON endpoint for Audun's automated Claude report
# (2026-07-23). Serves the current Supabase overview_state.data blob
# reshaped into per-developer arrays. See netlify/functions/state.js.
[[redirects]]
  from = "/state.json"
  to = "/.netlify/functions/state"
  status = 200

[functions]
  directory = "netlify/functions"
  # ESM function file; Netlify's Node 18+ runtime supports it natively.
  node_bundler = "esbuild"
